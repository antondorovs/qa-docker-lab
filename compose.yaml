services:
  api:
    build:
      context: ./api
    environment:
      PORT: ${API_PORT:-3000}
      SERVICE_NAME: ${SERVICE_NAME:-demo-api}
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 128m
    cpus: 0.50
    pids_limit: 100
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"
    stop_grace_period: 10s

  tests:
    build:
      context: .
    depends_on:
      api:
        condition: service_healthy
    environment:
      BASE_URL: http://api:${API_PORT:-3000}
      CI: "true"
      EXPECTED_SERVICE_NAME: ${SERVICE_NAME:-demo-api}
    volumes:
      - ./playwright-report:/tests/playwright-report
      - ./test-results:/tests/test-results

networks:
  default:
    internal: true
