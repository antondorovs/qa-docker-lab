services:
  api:
    build:
      context: ./api
    environment:
      PORT: ${API_PORT:-3000}
      SERVICE_NAME: ${SERVICE_NAME:-demo-api}
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:$${PORT}/health"]
      interval: 2s
      timeout: 2s
      retries: 10

  tests:
    build:
      context: .
    depends_on:
      api:
        condition: service_healthy
    environment:
      BASE_URL: http://api:${API_PORT:-3000}
      CI: "true"
      EXPECTED_SERVICE_NAME: ${SERVICE_NAME:-demo-api}
    volumes:
      - ./playwright-report:/tests/playwright-report
      - ./test-results:/tests/test-results
