services:
  api:
    build:
      context: ./api
    environment:
      PORT: 3000
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 2s
      timeout: 2s
      retries: 10

  tests:
    build:
      context: .
    depends_on:
      api:
        condition: service_healthy
    environment:
      BASE_URL: http://api:3000
      CI: "true"
    volumes:
      - ./playwright-report:/tests/playwright-report
      - ./test-results:/tests/test-results
